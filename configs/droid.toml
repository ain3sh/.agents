# droid.toml - unified droid config file

[flash_compact.defaults]
state_dir = "~/.agents/state/flash-compact"
prompt_cache_dir = "~/.agents/state/flash-compact/prompt-cache"
sessions_dir = "~/.factory/sessions"
morph_api_url = "https://api.morphllm.com/v1/compact"

# ------------------------------------------------------------------------------
[hooks]

# ---
[hooks.session_start]

[hooks.session_start.environment]
when = ["startup", "resume", "clear"]
secrets = "~/.factory/.env" # .env secrets loaded by env vars session-start hook
# config env vars
EXAMPLE_CONFIG_VAR = "clod"

[hooks.session_start.instructions]
prompts_dir = "~/.agents/prompts"
# prompt composition rules (ordered, files relative to prompts_dir)
[[hooks.session_start.instructions.rules]]
when = ["startup", "clear"]
include = ["instructions/OPERATOR.md"]
[[hooks.session_start.instructions.rules]]
when = ["compact"]
include = ["instructions/POST_COMPACT.md"]
[[hooks.session_start.instructions.rules]]
when = ["*"]
include = ["instructions/PRINCIPLES.md"]

# ---
[hooks.pre_tool_use]

[hooks.pre_tool_use.policy]
[hooks.pre_tool_use.policy.allow]
tools = ["LS", "Read", "WebFetch", "ExitSpecMode", "codebase:warpgrep_*","context:ask_docs_agent","context:fetch_docs","vscode:get_*","vscode:list_*"]
message = "[policy] {tool_name} is allowlisted"
[hooks.pre_tool_use.policy.ask]
tools = ["review:*"]
message = "[policy] confirm {tool_name} tool use"
[hooks.pre_tool_use.policy.deny]
tools = ["Grep","codebase:edit_file"]
message = "[policy] {tool_name} is denylisted"
[hooks.pre_tool_use.policy.overrides."Grep"]
decision = "deny"
message = "[policy] Grep blocked; use codebase_search for high-quality codebase searching, or read files directly for targeted info. Only use ripgrep through bash if searching **within** a file or collection of **logfiles**."
[hooks.pre_tool_use.policy.overrides."Execute"]
decision = "deny"
message = "[policy] Just use `rg` — it's faster and already available."
match_input.command = "\\bgrep\\b"

[hooks.pre_tool_use.commit_review_guard]
type = "committed"
max_chars = 6000

# ---
[hooks.post_tool_use]

[hooks.post_tool_use.instructions]
debug = false
prompts_dir = "~/.agents/prompts"

[[hooks.post_tool_use.instructions.rules]]
match.tool = "ExitSpecMode"
match.output = { approved = false }
include = ["instructions/IMPROVE_SPEC.md"]

[[hooks.post_tool_use.instructions.rules]]
match.tool = "ExitSpecMode"
match.output = { approved = true, isEdited = false }
include = ["instructions/IMPLEMENT_SPEC.md"]

[[hooks.post_tool_use.instructions.rules]]
match.tool = "ExitSpecMode"
match.output = { approved = true, isEdited = true }
include = ["instructions/IMPLEMENT_SPEC.md"]
include_text = ["Read ${filePath} fully to make a mental note of all changes made first."]

# ---
[hooks.notification]

# ---
[hooks.pre_compact]

[hooks.pre_compact.flash_compact]
enabled = true
debug = false
compression_ratio = 0.35
preserve_recent = 4
compact_prefix_max_tokens = 120000
include_markers = false
use_typed_reducers = true
recent_turns_raw = 4
execute_short_output_chars = 3000
execute_head_lines = 20
execute_tail_lines = 30
execute_max_signal_lines = 80
read_large_output_chars = 4000
todo_keep_latest_old = true
fail_open = true

# ---
[hooks.user_prompt_submit]

[hooks.user_prompt_submit.conflict_guard]
cache_dir = "/tmp/conflicts"
token_threshold = 20000
skip_prefix = "" # ignored if missing/null or empty string

[hooks.user_prompt_submit.flash_compact_budget]
enabled = true
debug = false
soft_turn_interval = 12
soft_token_delta = 30000
hard_token_threshold = 120000
hard_token_delta = 60000
cooldown_turns = 3
soft_action = "advisory"
hard_action = "block"
max_advisory_chars = 1200
fail_open = true

# ---
[hooks.subagent_stop]

# ---
[hooks.stop]

# ---
[hooks.session_end]

[hooks.session_end.store_artifacts]
tail = 1
tail_when = ["prompt_input_exit", "other"]
todo_when = ["prompt_input_exit", "clear", "other"]

[hooks.session_start.flash_compact_hydrate]
enabled = true
debug = false
sources = ["compact", "resume"]
max_injected_chars = 6000
fail_open = true

# ------------------------------------------------------------------------------
