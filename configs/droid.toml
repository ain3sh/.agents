# droid.toml - unified droid config file

# ------------------------------------------------------------------------------
[hooks]

# ---
[hooks.session_start]

[hooks.session_start.environment]
when = ["startup", "resume", "clear"]
secrets = "~/.factory/.env" # .env secrets loaded by env vars session-start hook
# config env vars
EXAMPLE_CONFIG_VAR = "clod"
TIRITH_INTEGRATION = "droid-cli"

[hooks.session_start.instructions]
prompts_dir = "~/.agents/prompts"
# prompt composition rules (ordered, files relative to prompts_dir)
[[hooks.session_start.instructions.rules]]
when = ["clear"]
include = ["SOUL.md"]
[[hooks.session_start.instructions.rules]]
when = ["startup", "clear"]
include = ["instructions/OPERATOR.md"]
[[hooks.session_start.instructions.rules]]
when = ["compact"]
include = ["instructions/POST_COMPACT.md"]
[[hooks.session_start.instructions.rules]]
when = ["startup", "clear", "compact"]
include = ["instructions/PRINCIPLES.md"]

# ---
[hooks.pre_tool_use]

[hooks.pre_tool_use.policy]
[hooks.pre_tool_use.policy.allow]
tools = ["LS", "Read", "WebFetch", "ExitSpecMode", "codebase:*_search","context:ask_docs_agent","context:fetch_docs","vscode:get_*","vscode:list_*"]
message = "[policy] {tool_name} is allowlisted"
[hooks.pre_tool_use.policy.ask]
tools = ["review:*"]
message = "[policy] confirm {tool_name} tool use"
[hooks.pre_tool_use.policy.deny]
tools = ["Grep","codebase:edit_file"]
message = "[policy] {tool_name} is denylisted"
[hooks.pre_tool_use.policy.overrides."Grep"]
decision = "deny"
message = "[policy] Grep blocked; use codebase_search for high-quality codebase searching, or read files directly for targeted info. Only use ripgrep through bash if searching **within** a file or collection of **logfiles**."
[hooks.pre_tool_use.policy.overrides."Execute"]
decision = "deny"
message = "[policy] Just use `rg` — it's faster and already available."
match_input.command = "\\bgrep\\b"

[hooks.pre_tool_use.commit_review_guard]
type = "committed"
max_chars = 6000

[hooks.pre_tool_use.rtk]
# Token-reduction proxy (https://github.com/rtk-ai/rtk). The hook calls
# `rtk rewrite` and, on success, mutates the Execute command in-flight.
# Transparent: if rtk is missing, slow, or has no rewrite for a command,
# the hook exits cleanly and the original command runs unmodified.
enabled = true

# Per-surface toggles. Any absent key defaults to enabled (true). Flip a
# single surface to `false` if its rewrite misbehaves in a real workflow —
# no need to disable the whole hook. Common surfaces: git, grep, read, ls,
# find, diff, gh, cargo, go, pytest, jest, vitest, playwright, rspec, rake,
# tsc, next, prettier, eslint, biome, knip, lint, ruff, rubocop,
# golangci-lint, docker, make, err, test, smart.
[hooks.pre_tool_use.rtk.surfaces]
# git = false   # e.g. keep raw git output if commit_review_guard needs it


[hooks.pre_tool_use.tirith]
# Tirith terminal-security guard — https://github.com/sheeki03/tirith
enabled   = true
fail_mode = "open"     # "closed" → deny when tirith unavailable
timeout   = 5
tools     = ["Execute", "Bash"]
# pipe_to_interpreter false-positive filter — LHS commands that don't fetch/eval remote content. [] to disable.
pipe_to_interpreter_safe_lhs = [
    "git", "gh", "linear", "jq", "yq",
    "cat", "echo", "printf",
    "head", "tail", "awk", "sed", "tr", "cut",
    "ls", "find", "rg", "grep", "sort", "uniq",
]

# ---
[hooks.post_tool_use]

[hooks.post_tool_use.instructions]
debug = false
prompts_dir = "~/.agents/prompts"

[[hooks.post_tool_use.instructions.rules]]
match.tool = "ExitSpecMode"
match.output = { approved = false }
include = ["instructions/IMPROVE_SPEC.md"]

[[hooks.post_tool_use.instructions.rules]]
match.tool = "ExitSpecMode"
match.output = { approved = true, isEdited = false }
include = ["instructions/IMPLEMENT_SPEC.md"]

[[hooks.post_tool_use.instructions.rules]]
match.tool = "ExitSpecMode"
match.output = { approved = true, isEdited = true }
include = ["instructions/IMPLEMENT_SPEC.md", "instructions/READ_EDITED_SPEC.md"]

[[hooks.post_tool_use.instructions.rules]]
match.tool = "ExitSpecMode"
match.output = { approved = true }
include = ["instructions/INIT_NOTES.md"]

# ---
[hooks.notification]

# ---
[hooks.pre_compact]

# ---
[hooks.user_prompt_submit]

[hooks.user_prompt_submit.conflict_guard]
cache_dir = "/tmp/conflicts"
token_threshold = 20000
skip_prefix = "" # ignored if missing/null or empty string

# ---
[hooks.subagent_stop]

# ---
[hooks.stop]

# ---
[hooks.session_end]

[hooks.session_end.store_artifacts]
tail = 1
tail_when = ["prompt_input_exit", "other"]
todo_when = ["prompt_input_exit", "clear", "other"]

# ------------------------------------------------------------------------------
